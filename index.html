<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LUMIERE 2026 - Annual Film Festival. Submit your films and celebrate cinema." />
    <meta name="theme-color" content="#111112" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      #app-boot-loader {
        position: fixed;
        inset: 0;
        z-index: 2000;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 22% 18%, rgba(126, 162, 255, 0.14), transparent 44%),
          radial-gradient(circle at 78% 12%, rgba(203, 165, 90, 0.15), transparent 42%),
          linear-gradient(180deg, #0a0a0b 0%, #0d0d0f 44%, #09090a 100%);
        color: #f2f2f2;
        font-family: "Space Grotesk", sans-serif;
        transition: opacity 220ms ease;
        animation: app-boot-autohide 0.32s ease 6s forwards;
      }

      #app-boot-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .app-boot-loader__content {
        text-align: center;
      }

      .app-boot-loader__logo {
        margin: 0 0 0.75rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.85);
      }

      .app-boot-loader__spinner {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.24);
        border-top-color: #cba55a;
        margin: 0 auto;
        animation: app-boot-spin 0.85s linear infinite;
      }

      .app-boot-loader__text {
        margin: 0.85rem 0 0;
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.92rem;
      }

      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes app-boot-autohide {
        to {
          opacity: 0;
          visibility: hidden;
          pointer-events: none;
        }
      }
    </style>
    <title>LUMIERE 2026 | Film Festival</title>
    <link rel="icon" type="image/png" href="/logo-text.png" />
  </head>
  <body>
    <div id="app-boot-loader" role="status" aria-live="polite" aria-label="Loading Lumiere website">
      <div class="app-boot-loader__content">
        <p class="app-boot-loader__logo">Lumiere 2026</p>
        <div class="app-boot-loader__spinner" aria-hidden="true"></div>
        <p class="app-boot-loader__text">Loading experience...</p>
      </div>
    </div>
    <script>
      (function () {
        var loader = document.getElementById('app-boot-loader');
        if (!loader) return;

        var textNode = loader.querySelector('.app-boot-loader__text');

        var hide = function () {
          loader.classList.add('is-hidden');
          window.setTimeout(function () {
            if (loader && loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }, 320);
        };

        var showStartupFailure = function (reason) {
          if (textNode) {
            textNode.textContent = reason || 'Startup failed. Check dev server and refresh.';
            textNode.style.color = '#ffd6d6';
          }
        };

        window.addEventListener('lumiere:app-mounted', hide, { once: true });

        // If React never mounts, keep loader visible and show a clear failure hint.
        window.setTimeout(function () {
          var root = document.getElementById('root');
          var mounted = Boolean(window.__LUMIERE_APP_MOUNTED__) || Boolean(root && root.hasChildNodes());
          if (!mounted) {
            showStartupFailure('Startup failed. The app bundle did not mount.');
          }
        }, 4500);

        // If there is a global startup error and app is still not mounted, expose it in loader text.
        window.addEventListener('error', function (event) {
          var root = document.getElementById('root');
          var mounted = Boolean(window.__LUMIERE_APP_MOUNTED__) || Boolean(root && root.hasChildNodes());
          if (!mounted) {
            showStartupFailure((event && event.message) || 'Runtime error during startup.');
          }
        });
        window.addEventListener('unhandledrejection', function (event) {
          var root = document.getElementById('root');
          var mounted = Boolean(window.__LUMIERE_APP_MOUNTED__) || Boolean(root && root.hasChildNodes());
          if (!mounted) {
            var reason = event && event.reason;
            showStartupFailure(reason && reason.message ? reason.message : String(reason || 'Unhandled promise rejection during startup.'));
          }
        });
      })();
    </script>
    <div id="root"></div>
    <div id="main-content"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
